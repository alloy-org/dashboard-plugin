<!-- Task: Dev HTML shell — loads styles, mock data, and client bundle -->
<!-- Prompt summary: "HTML page with dashboard-root div, loading mock-data.js then bundle.js" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Dev</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="dashboard-root"></div>
  <!-- [Claude] Task: live-reload client that listens for SSE rebuild events -->
  <!-- Prompt: "set up the dev version of the project to use hot reloading" -->
  <!-- Date: 2026-03-01 | Model: claude-opus-4-6 -->
  <script>
    (function () {
      var source = new EventSource("/esbuild-live-reload");
      source.onmessage = function (event) {
        var data = JSON.parse(event.data);
        if (data.type === "css") {
          var link = document.querySelector('link[rel="stylesheet"]');
          if (link) {
            var url = new URL(link.href);
            url.searchParams.set("t", Date.now());
            link.href = url.toString();
          }
        } else {
          location.reload();
        }
      };
      source.onerror = function () {
        source.close();
        setTimeout(function () { location.reload(); }, 2000);
      };
    })();
  </script>
  <script src="/mock-data.js"></script>
  <script src="/bundle.js"></script>
</body>
</html>
